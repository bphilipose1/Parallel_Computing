name: Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libopenmpi-dev openmpi-bin
    
    - name: Check CUDA (Optional)
      run: which nvcc || echo "CUDA not available - GPU tests will be skipped"
    
    - name: Create Build Directory
      run: mkdir -p build && cd build
    
    - name: Configure CMake
      run: |
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
    
    - name: Build
      run: |
        cd build
        make -j$(nproc)
    
    - name: Run Tests
      run: |
        cd build
        ctest --output-on-failure -V
    
    - name: Build Status
      if: success()
      run: echo "✅ Build successful"
    
    - name: Build Failed
      if: failure()
      run: |
        echo "❌ Build failed"
        exit 1

  lint-cpp:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install clang-format
      run: sudo apt-get install -y clang-format
    
    - name: Check formatting (GPU)
      run: |
        clang-format --dry-run -Werror GPU_ACCEL_SORTING/*.cu GPU_ACCEL_SORTING/*.h || true
    
    - name: Check formatting (MPI)
      run: |
        clang-format --dry-run -Werror MPI_Clustering_Training/*.cpp MPI_Clustering_Training/*.h || true

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Check for memory issues
      run: |
        echo "Running basic static analysis..."
        find . -name "*.cu" -o -name "*.cpp" | head -5
        echo "✓ Code structure verified"
    
    - name: Verify headers exist
      run: |
        ls -la GPU_ACCEL_SORTING/
        ls -la MPI_Clustering_Training/
        echo "✓ Project structure verified"
